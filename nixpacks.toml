# NIXPACKS Configuration for Python/Flask Project
# This file tells Railway to use Python builder, not Node.js

[providers]
python = "3.11"

[phases.setup]
nixPkgs = ["python311", "pip", "postgresql"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install --no-cache-dir -r requirements.txt"
]

[start]
cmd = "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile - app:app"

